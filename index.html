// Funzione per cercare un materiale nel database crafting
function findCraftMatch(materialText) {
  // Rimuovi quantità tipo "x20", "x64" ecc.
  const cleaned = materialText.replace(/\s*x\d+\s*/gi, "").replace(/\s*\(.*?\)\s*/g, "").trim().toLowerCase();
  // Cerca nella mappa italiana
  if (MATERIAL_CRAFT_MAP[cleaned]) return MATERIAL_CRAFT_MAP[cleaned];
  // Cerca parziale nella mappa
  for (const [key, val] of Object.entries(MATERIAL_CRAFT_MAP)) {
    if (cleaned.includes(key) || key.includes(cleaned)) return val;
  }
  // Cerca direttamente nel DB crafting per nome inglese
  const directMatch = CRAFTING_DB.find(i => i.nome.toLowerCase() === cleaned);
  if (directMatch) return directMatch.id;
  // Cerca parziale nel DB
  const partialMatch = CRAFTING_DB.find(i => cleaned.includes(i.nome.toLowerCase()) || i.nome.toLowerCase().includes(cleaned));
  if (partialMatch) return partialMatch.id;
  return null;
}
